<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The LITS</title>
    <style>
        body {
            background-color: #03080f;
            color: white;
            font-family: sans-serif;
            margin: 0;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            margin: 40px 0;
            letter-spacing: 10px;
        }

        .container {
            display: flex;
            height: 70vh;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .blue-side { background: linear-gradient(to bottom, #001e3c, #03080f); }
        .blue-side:hover { border-color: #00c8ff; }

        .gold-side { background: linear-gradient(to bottom, #1e1400, #03080f); }
        .gold-side:hover { border-color: #f5c842; }

        .silver-side { background: linear-gradient(to bottom, #2b2b2b, #03080f); }
        .silver-side:hover { border-color: #9e9e9e; }

        .character-box {
            width: 200px;
            height: 300px;
            background: #222;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        nav {
            display: flex;
            background: #111;
        }

        nav a {
            flex: 1;
            padding: 20px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
        }

        nav a:hover { color: white; background: #222; }
    </style>
</head>
<body>

    <h1>THE LITS</h1>

    <div class="container">
        <div class="panel blue-side">
            <div class="character-box"></div>
            <h2>DaylitPlatinum</h2>
            <p>Platinum / Non-Human</p>
        </div>

        <div class="panel gold-side">
            <div class="character-box"></div>
            <h2>SunlitGold</h2>
            <p>Gold-Silver alloy / Non-Human</p>
        </div>

        <div class="panel silver-side">
            <div class="character-box"></div>
            <h2>MoonlitSilver</h2>
            <p>Mercury-Silver alloy / Non-Human</p>
        </div>
    </div>

    <nav>
        <a href="gallery.html">Gallery</a>
        <a href="calendar.html">Calendar</a>
    </nav>

</body>
</html>
