<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The LITS - Simple Version</title>
    <style>
        body {
            background-color: #03080f;
            color: white;
            font-family: sans-serif;
            margin: 0;
            text-align: center;
        }

        /* The Big Title */
        h1 {
            font-size: 5rem;
            margin: 40px 0;
            letter-spacing: 10px;
        }

        /* The Split Container */
        .container {
            display: flex;
            height: 70vh;
        }

        /* Individual Sides */
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        /* Left side colors */
        .blue-side { background: linear-gradient(to bottom, #001e3c, #03080f); }
        .blue-side:hover { border-color: #00c8ff; }

        /* Right side colors */
        .gold-side { background: linear-gradient(to bottom, #1e1400, #03080f); }
        .gold-side:hover { border-color: #f5c842; }

        /* Simple Placeholder for Images */
        .character-box {
            width: 200px;
            height: 300px;
            background: #222;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        /* Bottom Nav */
        nav {
            display: flex;
            background: #111;
        }

        nav button {
            flex: 1;
            padding: 20px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            text-transform: uppercase;
        }

        nav button:hover { color: white; background: #222; }
    </style>
</head>
<body>

    <h1>THE LITS</h1>

    <div class="container">
        <div class="panel blue-side">
            <div class="character-box">Image 1 Here</div>
            <h2>BLUE AGENT</h2>
            <p>Crystal Meth / Non-Human</p>
        </div>

        <div class="panel gold-side">
            <div class="character-box">Image 2 Here</div>
            <h2>SunlitGold</h2>
            <p>Legacy / Non-Human</p>
        </div>
    </div>

    <nav>
        <button>Login</button>
        <button>Gallery</button>
        <button>Calendar</button>
        <button style="color: #c084fc;">AI Gen</button>
    </nav>

</body>
</html>
